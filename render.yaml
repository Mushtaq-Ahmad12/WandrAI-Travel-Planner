services:
  # Backend FastAPI Web Service
  - type: web
    name: wandrai-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You will enter your Gemini API key in Render dashboard
      - key: FAISS_PERSIST_DIR
        value: "./vector_db/faiss_store"

  # Frontend Vite Static Site
  - type: web
    name: wandrai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: wandrai-backend
          envVarKey: RENDER_EXTERNAL_URL
